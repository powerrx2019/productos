<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POWERX — Catálogo de Suplementos</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --dark: #111318;
      --card: #16191f;
      --border: #252830;
      --red: #e8001d;
      --red-dark: #b0001a;
      --red-glow: rgba(232,0,29,0.18);
      --gold: #f5c400;
      --text: #f0f0f0;
      --muted: #8a8f9e;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--dark);
      border-bottom: 2px solid var(--red);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 30px rgba(232,0,29,0.15);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
      flex-wrap: wrap;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 3px;
      color: var(--text);
      line-height: 1;
    }

    .logo span { color: var(--red); }

    .tagline {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .search-wrap {
      flex: 1;
      min-width: 220px;
      max-width: 420px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: #0f1117;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px 10px 42px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--red); }
    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
      pointer-events: none;
    }

    .header-info {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: right;
      line-height: 1.5;
    }

    .header-info strong { color: var(--red); }

    /* ── PRICE LEGEND ── */
    .price-legend {
      background: linear-gradient(135deg, #16191f 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 8px 20px;
    }

    .legend-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .legend-label {
      font-size: 0.7rem;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .legend-items {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot-menudeo { background: var(--text); }
    .dot-3k { background: #3b82f6; }
    .dot-6k { background: var(--gold); }

    /* ── MAIN LAYOUT ── */
    .layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; gap: 0; padding: 0; }
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky;
      top: 90px;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: static;
        padding: 12px 16px 0;
      }
    }

    .sidebar-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .cat-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    @media (max-width: 768px) {
      .cat-list {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 6px;
        padding-bottom: 12px;
      }
    }

    .cat-btn {
      background: none;
      border: 1.5px solid transparent;
      border-radius: 7px;
      padding: 8px 12px;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.15s;
      width: 100%;
    }

    @media (max-width: 768px) {
      .cat-btn { width: auto; font-size: 0.75rem; padding: 6px 10px; }
    }

    .cat-btn:hover {
      background: var(--card);
      color: var(--text);
      border-color: var(--border);
    }

    .cat-btn.active {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .cat-count {
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.68rem;
      font-weight: 700;
    }

    .cat-btn.active .cat-count { background: rgba(0,0,0,0.25); }

    /* ── MAIN CONTENT ── */
    .main-content { min-width: 0; }

    @media (max-width: 768px) {
      .main-content { padding: 0 12px 20px; }
    }

    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-top: 4px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .results-count {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .results-count strong { color: var(--text); }

    /* ── PRODUCT GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }

    /* ── PRODUCT CARD ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      animation: fadeIn 0.3s ease both;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--red);
      box-shadow: 0 8px 32px var(--red-glow);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-img-wrap {
      position: relative;
      aspect-ratio: 1;
      background: #0d0f14;
      overflow: hidden;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 12px;
      transition: transform 0.3s;
    }

    .card:hover .card-img-wrap img { transform: scale(1.05); }

    .card-cat-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--red);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
    }

    .no-img {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 8px;
    }

    .no-img-icon { font-size: 2rem; opacity: 0.4; }
    .no-img-text { font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; }

    .card-body {
      padding: 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-brand {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      text-transform: uppercase;
    }

    .card-desc {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 2px;
    }

    .card-prices {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .price-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .price-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .price-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
    }

    .price-menudeo { color: var(--text); }
    .price-3k { color: #3b82f6; }
    .price-6k { color: var(--gold); }

    .price-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0 2px;
    }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }
    .empty h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 8px; }
    .empty p { font-size: 0.9rem; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 32px 20px;
      color: var(--muted);
      font-size: 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: 40px;
      letter-spacing: 0.5px;
    }

    footer strong { color: var(--red); }

    /* ── SCROLL TO TOP ── */
    #toTop {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #toTop.visible { opacity: 1; pointer-events: auto; }

    /* ── CART BUTTON (header) ── */
    .cart-icon-btn {
      position: relative;
      background: var(--red);
      border: none;
      color: #fff;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .cart-icon-btn:hover { background: var(--red-dark); }
    .cart-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--gold);
      color: #000;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 0.65rem;
      font-weight: 800;
      min-width: 18px;
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
    }

    /* ── PRICE TIER SELECTOR (en la barra de leyenda) ── */
    .tier-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text);
      background: none;
      border: 1.5px solid transparent;
      border-radius: 7px;
      padding: 4px 9px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      transition: all 0.15s;
    }
    .tier-btn:hover { border-color: var(--border); }
    .tier-btn.active {
      border-color: currentColor;
      background: rgba(255,255,255,0.06);
      font-weight: 700;
    }
    .legend-hint {
      font-size: 0.68rem;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── ADD TO CART BUTTON ON CARD ── */
    .card-add-row {
      margin-top: 8px;
    }
    .add-cart-btn {
      width: 100%;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 8px 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .add-cart-btn:hover { background: var(--red-dark); }
    .add-cart-btn.added { background: #1ebe5d; }

    /* ── CART DRAWER ── */
    .cart-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 199;
    }
    .cart-overlay.show { display: block; }

    .cart-drawer {
      position: fixed;
      top: 0;
      right: -380px;
      width: 360px;
      max-width: 92vw;
      height: 100vh;
      background: var(--dark);
      border-left: 1.5px solid var(--border);
      z-index: 200;
      display: flex;
      flex-direction: column;
      transition: right 0.25s ease;
      box-shadow: -8px 0 30px rgba(0,0,0,0.4);
    }
    .cart-drawer.open { right: 0; }

    .cart-head {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cart-head h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 1.5px;
    }
    .cart-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
    }
    .cart-close:hover { color: var(--text); }

    .cart-tier-info {
      padding: 8px 16px;
      font-size: 0.75rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .cart-tier-info strong { color: var(--gold); }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .cart-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 8px;
      text-align: center;
    }
    .cart-empty .eico { font-size: 2.6rem; opacity: 0.3; }

    .cart-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .ci-top {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 7px;
    }
    .ci-name {
      flex: 1;
      font-weight: 600;
      font-size: 0.78rem;
      line-height: 1.3;
    }
    .ci-rm {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .ci-rm:hover { color: var(--red); }
    .ci-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .qty-wrap {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .qty-btn {
      background: #0f1117;
      border: none;
      color: var(--text);
      width: 26px;
      height: 26px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qty-btn:hover { background: var(--border); }
    .qty-val {
      width: 30px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .ci-sub {
      margin-left: auto;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: var(--gold);
      white-space: nowrap;
    }

    .cart-totals {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
    }
    .tot-row {
      display: flex;
      justify-content: space-between;
      font-size: 1.05rem;
      align-items: center;
    }
    .tot-row .lbl { color: var(--muted); font-size: 0.8rem; }
    .tot-row .val {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--gold);
    }

    .cart-actions {
      padding: 10px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .wa-btn {
      background: #25D366;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 9px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .wa-btn:hover { background: #1ebe5d; }
    .wa-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px;
      border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .btn-clear:hover { border-color: var(--text); color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="logo">POWER<span>X</span></div>
      <div class="tagline">Catálogo de Suplementos</div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar producto o marca..." autocomplete="off">
    </div>
    <div class="header-info">
      <div>📞 <strong>311 127 16 70</strong></div>
      <div>C. Viejo al Tecolote 9A</div>
    </div>
    <button class="cart-icon-btn" id="cartOpenBtn" title="Ver cotización">
      🛒
      <span class="cart-badge" id="cartBadge" style="display:none">0</span>
    </button>
  </div>
</header>

<div class="price-legend">
  <div class="legend-inner">
    <span class="legend-label">Precios:</span>
    <div class="legend-items" id="tierSelector">
      <button class="tier-btn active" data-tier="menudeo" style="color:var(--text)" onclick="setTier('menudeo')"><span class="legend-dot dot-menudeo"></span> Menudeo</button>
      <button class="tier-btn" data-tier="mayoreo3k" style="color:#3b82f6" onclick="setTier('mayoreo3k')"><span class="legend-dot dot-3k"></span> Mayoreo $3,000</button>
      <button class="tier-btn" data-tier="mayoreo6k" style="color:var(--gold)" onclick="setTier('mayoreo6k')"><span class="legend-dot dot-6k"></span> Mayoreo $6,000</button>
    </div>
    <span class="legend-hint">Elige el precio con el que se agregará al carrito</span>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">Categorías</div>
    <div class="cat-list" id="catList"></div>
  </aside>

  <main class="main-content">
    <div class="results-bar">
      <div class="results-count" id="resultsCount"></div>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<footer>
  <strong>POWERX</strong> — Suplementos Power Reaxion &nbsp;·&nbsp; C. Viejo al Tecolote 9A &nbsp;·&nbsp; Tel: 311 127 16 70
</footer>

<button id="toTop" title="Volver arriba">↑</button>

<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-head">
    <h2>🛒 Cotización</h2>
    <button class="cart-close" onclick="closeCart()">×</button>
  </div>
  <div class="cart-tier-info">Precio activo: <strong id="cartTierLabel">Menudeo</strong></div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-totals">
    <div class="tot-row">
      <span class="lbl">Total</span>
      <span class="val" id="cartTotal">$0</span>
    </div>
  </div>
  <div class="cart-actions">
    <button class="wa-btn" id="waBtn" onclick="sendWA()">📲 Enviar por WhatsApp</button>
    <button class="btn-clear" onclick="clearCart()">Vaciar cotización</button>
  </div>
</div>

<script src="precios.js"></script>
<script src="descripciones.js"></script>
<script>
  // Cruzar descripciones con productos por nombre
  const descMap = {};
  descripciones.forEach(d => { descMap[d.nombre.trim()] = d.descripcion; });
  productos.forEach(p => { p.descripcion = descMap[p.nombre.trim()] || ''; });

  const CATEGORIAS = [
    'TODAS',
    'ACCESORIOS','AMINOACIDOS','AMINOACIDOS/GLUTAMINAS','COLAGENOS','CREATINAS',
    'FARMACOLOGIA','GANADORES DE PESO','GLUTAMINAS','OTROS','PRE ENTRENOS',
    'PRECURSORES','PROTEINAS','QUEMADORES','VITAMINAS','VITAMINAS/PRECURSORES'
  ];

  const CAT_LABELS = {
    'TODAS': 'Todas',
    'ACCESORIOS': 'Accesorios',
    'AMINOACIDOS': 'Aminoácidos',
    'AMINOACIDOS/GLUTAMINAS': 'Amino / Glutaminas',
    'COLAGENOS': 'Colágenos',
    'CREATINAS': 'Creatinas',
    'FARMACOLOGIA': 'Farmacología',
    'GANADORES DE PESO': 'Ganadores de Peso',
    'GLUTAMINAS': 'Glutaminas',
    'OTROS': 'Otros',
    'PRE ENTRENOS': 'Pre Entrenos',
    'PRECURSORES': 'Precursores',
    'PROTEINAS': 'Proteínas',
    'QUEMADORES': 'Quemadores',
    'VITAMINAS': 'Vitaminas',
    'VITAMINAS/PRECURSORES': 'Vitaminas / Precursores',
  };

  let currentCat = 'TODAS';
  let currentSearch = '';

  function fmt(n) {
    return n > 0 ? '$' + n.toLocaleString('es-MX') : '—';
  }

  function filteredProducts() {
    return productos.filter(p => {
      const matchCat = currentCat === 'TODAS' || p.categoria === currentCat;
      const q = currentSearch.toLowerCase().trim();
      const matchSearch = !q ||
        p.nombre.toLowerCase().includes(q) ||
        p.marca.toLowerCase().includes(q) ||
        p.categoria.toLowerCase().includes(q);
      return matchCat && matchSearch;
    });
  }

  function countByCat(cat) {
    return cat === 'TODAS' ? productos.length :
      productos.filter(p => p.categoria === cat).length;
  }

  function renderSidebar() {
    const list = document.getElementById('catList');
    list.innerHTML = CATEGORIAS.map(cat => {
      const active = cat === currentCat ? 'active' : '';
      const count = countByCat(cat);
      return `<button class="cat-btn ${active}" onclick="selectCat('${cat}')">
        ${CAT_LABELS[cat] || cat}
        <span class="cat-count">${count}</span>
      </button>`;
    }).join('');
  }

  function renderGrid() {
    const items = filteredProducts();
    const grid = document.getElementById('grid');
    const counter = document.getElementById('resultsCount');

    counter.innerHTML = `Mostrando <strong>${items.length}</strong> de ${productos.length} productos`;

    if (items.length === 0) {
      grid.innerHTML = `<div class="empty">
        <div class="empty-icon">🔍</div>
        <h3>Sin resultados</h3>
        <p>Intenta con otro término o categoría</p>
      </div>`;
      return;
    }

    grid.innerHTML = items.map((p, i) => {
      const imgSrc = p.imagen ? `imagenes/${p.imagen}` : null;
      const imgHtml = imgSrc
        ? `<img src="${imgSrc}" alt="${p.nombre}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'><div class=\\'no-img-icon\\'>📦</div><div class=\\'no-img-text\\'>Sin imagen</div></div>'">`
        : `<div class="no-img"><div class="no-img-icon">📦</div><div class="no-img-text">Sin imagen</div></div>`;

      const delay = Math.min(i * 20, 300);

      return `<div class="card" style="animation-delay:${delay}ms">
        <div class="card-img-wrap">
          ${imgHtml}
          <div class="card-cat-badge">${p.categoria}</div>
        </div>
        <div class="card-body">
          <div class="card-brand">${p.marca}</div>
          <div class="card-name">${p.nombre}</div>
          ${p.descripcion ? `<div class="card-desc">${p.descripcion}</div>` : ''}
          <div class="card-prices">
            <hr class="price-divider">
            <div class="price-row">
              <span class="price-label"><span class="price-dot dot-menudeo"></span>Menudeo</span>
              <span class="price-val price-menudeo">${fmt(p.menudeo)}</span>
            </div>
            <div class="price-row">
              <span class="price-label"><span class="price-dot dot-3k"></span>Mayoreo 3k</span>
              <span class="price-val price-3k">${fmt(p.mayoreo3k)}</span>
            </div>
            <div class="price-row">
              <span class="price-label"><span class="price-dot dot-6k"></span>Mayoreo 6k</span>
              <span class="price-val price-6k">${fmt(p.mayoreo6k)}</span>
            </div>
          </div>
          <div class="card-add-row">
            <button class="add-cart-btn" onclick="addToCart('${p.nombre.replace(/'/g, "\\'")}', this)">+ Agregar a cotización</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function selectCat(cat) {
    currentCat = cat;
    renderSidebar();
    renderGrid();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value;
    renderGrid();
  });

  // Scroll to top
  const toTop = document.getElementById('toTop');
  window.addEventListener('scroll', () => {
    toTop.classList.toggle('visible', window.scrollY > 400);
  });
  toTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

  // ═══ CARRITO ═══
  const TIER_LABELS = { menudeo: 'Menudeo', mayoreo3k: 'Mayoreo $3,000', mayoreo6k: 'Mayoreo $6,000' };
  let currentTier = 'menudeo';
  let cart = {}; // { nombre: cantidad }

  function setTier(tier) {
    currentTier = tier;
    document.querySelectorAll('.tier-btn').forEach(b => b.classList.toggle('active', b.dataset.tier === tier));
    document.getElementById('cartTierLabel').textContent = TIER_LABELS[tier];
    renderCart();
  }

  function addToCart(nombre, btn) {
    cart[nombre] = (cart[nombre] || 0) + 1;
    renderCart();
    if (btn) {
      btn.textContent = '✓ Agregado';
      btn.classList.add('added');
      setTimeout(() => { btn.textContent = '+ Agregar a cotización'; btn.classList.remove('added'); }, 900);
    }
    openCart();
  }

  function changeQty(nombre, delta) {
    if (!cart[nombre]) return;
    cart[nombre] += delta;
    if (cart[nombre] <= 0) delete cart[nombre];
    renderCart();
  }

  function removeFromCart(nombre) {
    delete cart[nombre];
    renderCart();
  }

  function clearCart() {
    cart = {};
    renderCart();
  }

  function cartCount() {
    return Object.values(cart).reduce((a, b) => a + b, 0);
  }

  function cartTotal() {
    return Object.entries(cart).reduce((sum, [nombre, qty]) => {
      const p = productos.find(x => x.nombre === nombre);
      return sum + (p ? p[currentTier] * qty : 0);
    }, 0);
  }

  function renderCart() {
    const itemsEl = document.getElementById('cartItems');
    const badge = document.getElementById('cartBadge');
    const count = cartCount();

    badge.style.display = count > 0 ? 'block' : 'none';
    badge.textContent = count;

    const entries = Object.entries(cart);
    if (entries.length === 0) {
      itemsEl.innerHTML = `<div class="cart-empty">
        <div class="eico">🛒</div>
        <div>Tu cotización está vacía.<br>Agrega productos del catálogo.</div>
      </div>`;
    } else {
      itemsEl.innerHTML = entries.map(([nombre, qty]) => {
        const p = productos.find(x => x.nombre === nombre);
        if (!p) return '';
        const unit = p[currentTier];
        const sub = unit * qty;
        return `<div class="cart-item">
          <div class="ci-top">
            <div class="ci-name">${p.nombre}</div>
            <button class="ci-rm" onclick="removeFromCart('${nombre.replace(/'/g, "\\'")}')">×</button>
          </div>
          <div class="ci-controls">
            <div class="qty-wrap">
              <button class="qty-btn" onclick="changeQty('${nombre.replace(/'/g, "\\'")}', -1)">−</button>
              <span class="qty-val">${qty}</span>
              <button class="qty-btn" onclick="changeQty('${nombre.replace(/'/g, "\\'")}', 1)">+</button>
            </div>
            <span class="ci-sub">${fmt(sub)}</span>
          </div>
        </div>`;
      }).join('');
    }

    document.getElementById('cartTotal').textContent = fmt(cartTotal());
    document.getElementById('waBtn').disabled = entries.length === 0;
  }

  function openCart() {
    document.getElementById('cartDrawer').classList.add('open');
    document.getElementById('cartOverlay').classList.add('show');
  }

  function closeCart() {
    document.getElementById('cartDrawer').classList.remove('open');
    document.getElementById('cartOverlay').classList.remove('show');
  }

  document.getElementById('cartOpenBtn').addEventListener('click', openCart);

  let cotCounter = 0;

  function sendWA() {
    const entries = Object.entries(cart);
    if (entries.length === 0) return;

    cotCounter++;
    const now = new Date();
    const fecha = now.toLocaleDateString('es-MX', { day: 'numeric', month: 'long', year: 'numeric' });
    const cotNum = 'COT-' + String(cotCounter).padStart(3, '0');
    const sep = '━━━━━━━━━━━━━━━━━━━━━━';
    const tierLabel = TIER_LABELS[currentTier];

    let msg = `*🏋️ POWER REAXION — Suplementos Deportivos*\n`;
    msg += `📋 ${cotNum} | ${fecha}\n`;
    msg += `${sep}\n`;

    let i = 1;
    entries.forEach(([nombre, qty]) => {
      const p = productos.find(x => x.nombre === nombre);
      if (!p) return;
      const unit = p[currentTier];
      msg += `*${i}. ${p.nombre}*\n   *${qty} pza* × *${fmt(unit)}* (${tierLabel}) = *${fmt(unit * qty)}*\n`;
      i++;
    });

    const total = cartTotal();
    const count = Object.values(cart).reduce((a, b) => a + b, 0);
    const totalFmt = total.toLocaleString('es-MX', { style: 'currency', currency: 'MXN', minimumFractionDigits: 2 });
    msg += `${sep}\n`;
    msg += `📦 ${count} producto${count !== 1 ? 's' : ''}\n`;
    msg += `✅ *TOTAL: ${totalFmt}*\n`;
    msg += `Cotización válida por 7 días · Precios en MXN`;

    const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  }

  // Init
  renderSidebar();
  renderGrid();
  renderCart();
</script>
</body>
</html>
